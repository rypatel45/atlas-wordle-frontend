<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#2dd4bf"></stop>
      <stop offset="100%" stop-color="#3b82f6"></stop>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#g)"></circle>

  <!-- grid (wordle vibe but subtle) -->
  <rect x="8" y="8" width="16" height="16" fill="none" stroke="white" stroke-width="1" opacity="0.7"></rect>

  <line x1="16" y1="8" x2="16" y2="24" stroke="white" stroke-width="1" opacity="0.7"></line>
  <line x1="8" y1="16" x2="24" y2="16" stroke="white" stroke-width="1" opacity="0.7"></line>

  <!-- center point (map pin feel) -->
  <circle cx="16" cy="16" r="2.2" fill="white"></circle>
</svg>