<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuess Grid</title>
    <link rel="shortcut icon" href="/static/favicon.svg" type="image/x-icon">
    <link rel="stylesheet"
          href="/static/css/style.css">
</head>
<body>

<div class="container">

    <div class="topbar">

        <h1>🌍 World Grid</h1>

        <button class="new-country-btn" onclick="resetGame()">
            New Country ↻
        </button>

    </div>

    <div class="hint">
        Continent:
        <span id="continent">Loading...</span>
    </div>

    <div id="board"></div>
    <div id="keyboard"></div>
    <div id="message"></div>


</div>
<div id="confirmModal" class="modal hidden">
    <div class="modal-box">

        <p>Start a new country?</p>
        <p style="font-size: 12px; opacity: 0.7;">
            Your current progress will be lost
        </p>

        <div class="modal-buttons">
            <button onclick="confirmReset(true)">Yes</button>
            <button onclick="confirmReset(false)">Cancel</button>
        </div>

    </div>
</div>
<div id="winScreen" class="win hidden">
    <div class="win-box">
        🎉 You Won!
        <button onclick="confirmReset(true)">Play Again</button>
    </div>
</div>
<div id="particles"></div>
<script src="static/js/script.js"></script>

</body>
</html>
